<!DOCTYPE html><script type="application/json" id="cowork-artifact-meta">
{
  "name": "Assembly Availability",
  "schemaVersion": 1,
  "description": "Assembly availability dashboard showing buildable units per composite product based on BOM component stock in Zoho Inventory. Refreshed daily at 7 AM by the assembly-dashboard-refresh scheduled task."
}
</script>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assembly Availability — stat.io</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8fafc; color: #1e293b; padding: 16px; font-size: 14px; }
  h1 { font-size: 17px; font-weight: 700; color: #0f172a; }
  .subtitle { color: #64748b; font-size: 12px; margin-top: 2px; margin-bottom: 14px; }
  .summary { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .summary-card { flex: 1; min-width: 80px; border-radius: 10px; padding: 10px 12px; cursor: pointer; transition: opacity 0.15s; }
  .summary-card:hover { opacity: 0.85; }
  .summary-card .count { font-size: 26px; font-weight: 800; line-height: 1; }
  .summary-card .label { font-size: 11px; margin-top: 3px; font-weight: 500; }
  .card-red { background: #fef2f2; border: 1px solid #fecaca; }
  .card-yellow { background: #fefce8; border: 1px solid #fde68a; }
  .card-green { background: #f0fdf4; border: 1px solid #bbf7d0; }
  .card-total { background: #f1f5f9; border: 1px solid #e2e8f0; }
  .count-red { color: #dc2626; }
  .count-yellow { color: #ca8a04; }
  .count-green { color: #16a34a; }
  .count-total { color: #475569; }
  .controls { display: flex; gap: 7px; margin-bottom: 11px; flex-wrap: wrap; align-items: center; }
  .search { flex: 1; min-width: 150px; background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 7px 11px; color: #1e293b; font-size: 13px; outline: none; }
  .search:focus { border-color: #6366f1; box-shadow: 0 0 0 2px rgba(99,102,241,0.15); }
  .filter-btn { padding: 6px 11px; border-radius: 8px; border: 1px solid #e2e8f0; background: #fff; color: #475569; font-size: 12px; cursor: pointer; transition: all 0.12s; font-weight: 500; }
  .filter-btn:hover { background: #f1f5f9; }
  .filter-btn.active-all { background: #eef2ff; border-color: #a5b4fc; color: #4338ca; }
  .filter-btn.active-red { background: #fef2f2; border-color: #fca5a5; color: #dc2626; }
  .filter-btn.active-yellow { background: #fefce8; border-color: #fde68a; color: #ca8a04; }
  .filter-btn.active-green { background: #f0fdf4; border-color: #86efac; color: #16a34a; }
  .items-grid { display: flex; flex-direction: column; gap: 5px; }
  .item-card { border-radius: 9px; border: 1px solid; overflow: hidden; cursor: pointer; transition: box-shadow 0.1s; background: #fff; }
  .item-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .item-card.red { border-color: #fecaca; }
  .item-card.yellow { border-color: #fde68a; }
  .item-card.green { border-color: #bbf7d0; }
  .item-header { display: flex; align-items: center; gap: 10px; padding: 9px 12px; }
  .badge { display: inline-flex; align-items: center; justify-content: center; min-width: 44px; height: 30px; border-radius: 7px; font-size: 15px; font-weight: 800; padding: 0 6px; flex-shrink: 0; }
  .badge.red { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
  .badge.yellow { background: #fefce8; color: #ca8a04; border: 1px solid #fde68a; }
  .badge.green { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
  .item-info { flex: 1; min-width: 0; }
  .item-name { font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #0f172a; }
  .item-meta { font-size: 11px; color: #64748b; margin-top: 2px; }
  .expand-icon { font-size: 11px; color: #94a3b8; flex-shrink: 0; transition: transform 0.2s; }
  .item-card.expanded .expand-icon { transform: rotate(180deg); }
  .item-detail { display: none; padding: 0 12px 10px; }
  .item-card.expanded .item-detail { display: block; }
  .comp-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .comp-table th { text-align: left; padding: 4px 7px; color: #94a3b8; font-weight: 500; border-bottom: 1px solid #f1f5f9; font-size: 11px; text-transform: uppercase; letter-spacing: 0.03em; }
  .comp-table td { padding: 4px 7px; border-bottom: 1px solid #f8fafc; color: #334155; }
  .comp-table tr:last-child td { border-bottom: none; }
  .comp-table tr.bottleneck-row td { font-weight: 600; background: #fef2f2; }
  .comp-table tr.bottleneck-row td:first-child::before { content: "⚠ "; }
  .can-build-val { font-weight: 700; }
  .can-build-val.limiting { color: #dc2626; }
  .can-build-val.ok { color: #16a34a; }
  .no-results { text-align: center; padding: 28px; color: #94a3b8; font-size: 13px; }
  .updated-bar { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; padding-top: 8px; border-top: 1px solid #f1f5f9; }
  .updated-text { font-size: 11px; color: #94a3b8; }
  .refresh-note { font-size: 11px; color: #6366f1; font-weight: 500; }
</style>
</head>
<body>
<h1>Assembly Availability</h1>
<p class="subtitle">Buildable units per product based on BOM component stock in Zoho Inventory</p>

<div class="summary" id="summary"></div>

<div class="controls">
  <input class="search" type="text" placeholder="Search products or components..." id="searchInput" oninput="filterItems()">
  <button class="filter-btn active-all" id="btn-all" onclick="setFilter('all')">All</button>
  <button class="filter-btn" id="btn-red" onclick="setFilter('red')">🔴 Critical</button>
  <button class="filter-btn" id="btn-yellow" onclick="setFilter('yellow')">🟡 Low</button>
  <button class="filter-btn" id="btn-green" onclick="setFilter('green')">🟢 Healthy</button>
</div>

<div class="items-grid" id="itemsGrid"></div>

<div class="updated-bar">
  <span class="updated-text" id="updatedAt"></span>
  <span class="refresh-note">↻ Refreshed daily at 7 AM</span>
</div>

<script>
// DATA_PLACEHOLDER — replaced by daily refresh task
const ASSEMBLY_DATA = [];

const YELLOW_THRESHOLD = 20;
function getStatus(n) { if (n <= 0) return 'red'; if (n <= YELLOW_THRESHOLD) return 'yellow'; return 'green'; }

let activeFilter = 'all';

function renderSummary() {
  const red = ASSEMBLY_DATA.filter(d => getStatus(d.max_buildable) === 'red').length;
  const yellow = ASSEMBLY_DATA.filter(d => getStatus(d.max_buildable) === 'yellow').length;
  const green = ASSEMBLY_DATA.filter(d => getStatus(d.max_buildable) === 'green').length;
  document.getElementById('summary').innerHTML = `
    <div class="summary-card card-red" onclick="setFilter('red')"><div class="count count-red">${red}</div><div class="label">🔴 Can't Build</div></div>
    <div class="summary-card card-yellow" onclick="setFilter('yellow')"><div class="count count-yellow">${yellow}</div><div class="label">🟡 Low (≤${YELLOW_THRESHOLD})</div></div>
    <div class="summary-card card-green" onclick="setFilter('green')"><div class="count count-green">${green}</div><div class="label">🟢 Healthy</div></div>
    <div class="summary-card card-total" onclick="setFilter('all')"><div class="count count-total">${ASSEMBLY_DATA.length}</div><div class="label">Total Products</div></div>
  `;
}

function setFilter(f) {
  activeFilter = f;
  ['all','red','yellow','green'].forEach(k => {
    document.getElementById('btn-'+k).className = 'filter-btn' + (k === f ? ' active-'+k : '');
  });
  renderItems();
}

function filterItems() { renderItems(); }

function renderItems() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let items = ASSEMBLY_DATA;
  if (activeFilter !== 'all') items = items.filter(d => getStatus(d.max_buildable) === activeFilter);
  if (q) items = items.filter(d =>
    d.name.toLowerCase().includes(q) ||
    (d.sku && d.sku.toLowerCase().includes(q)) ||
    d.bottleneck.toLowerCase().includes(q) ||
    d.components.some(c => c.name.toLowerCase().includes(q))
  );

  const grid = document.getElementById('itemsGrid');
  if (!items.length) { grid.innerHTML = '<div class="no-results">No products match your filter.</div>'; return; }

  grid.innerHTML = items.map((d, i) => {
    const st = getStatus(d.max_buildable);
    const displayNum = d.max_buildable <= 0 ? '0' : d.max_buildable >= 1000 ? (d.max_buildable/1000).toFixed(1)+'k' : d.max_buildable;
    const comps = [...d.components].sort((a,b) => a.can_build - b.can_build);
    const rows = comps.map(c => {
      const isBN = c.name === d.bottleneck;
      return `<tr class="${isBN ? 'bottleneck-row' : ''}">
        <td>${c.name}</td>
        <td style="text-align:right;color:#94a3b8">${c.qty_per > 1 ? '×'+c.qty_per : '×1'}</td>
        <td style="text-align:right;color:#64748b">${c.available}</td>
        <td style="text-align:right"><span class="can-build-val ${isBN ? 'limiting' : 'ok'}">${c.can_build}</span></td>
      </tr>`;
    }).join('');
    return `<div class="item-card ${st}" id="card-${i}" onclick="toggleCard(${i})">
      <div class="item-header">
        <div class="badge ${st}">${displayNum}</div>
        <div class="item-info">
          <div class="item-name">${d.name}</div>
          <div class="item-meta">Bottleneck: <strong>${d.bottleneck}</strong>${d.sku ? ' · ' + d.sku : ''}</div>
        </div>
        <div class="expand-icon">▼</div>
      </div>
      <div class="item-detail">
        <table class="comp-table">
          <thead><tr><th>Component</th><th style="text-align:right">Per Unit</th><th style="text-align:right">In Stock</th><th style="text-align:right">Can Build</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
  }).join('');
}

function toggleCard(i) {
  document.getElementById('card-'+i).classList.toggle('expanded');
}

const updated = ASSEMBLY_DATA[0]?.updated || 'unknown';
document.getElementById('updatedAt').textContent = 'Last updated: ' + updated + ' · stat.io Zoho Inventory';
renderSummary();
renderItems();
</script>
</body>
</html>
