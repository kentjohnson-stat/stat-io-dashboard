const YELLOW_THRESHOLD = 20;
function getStatus(n) { if (n <= 0) return 'red'; if (n <= YELLOW_THRESHOLD) return 'yellow'; return 'green'; }

let activeFilter = 'all';

function renderSummary() {
  const red = ASSEMBLY_DATA.filter(d => getStatus(d.max_buildable) === 'red').length;
  const yellow = ASSEMBLY_DATA.filter(d => getStatus(d.max_buildable) === 'yellow').length;
  const green = ASSEMBLY_DATA.filter(d => getStatus(d.max_buildable) === 'green').length;
  document.getElementById('summary').innerHTML = `
    <div class="summary-card card-red" onclick="setFilter('red')"><div class="count count-red">${red}</div><div class="label">🔴 Can't Build</div></div>
    <div class="summary-card card-yellow" onclick="setFilter('yellow')"><div class="count count-yellow">${yellow}</div><div class="label">🟡 Low (≤${YELLOW_THRESHOLD})</div></div>
    <div class="summary-card card-green" onclick="setFilter('green')"><div class="count count-green">${green}</div><div class="label">🟢 Healthy</div></div>
    <div class="summary-card card-total" onclick="setFilter('all')"><div class="count count-total">${ASSEMBLY_DATA.length}</div><div class="label">Total Products</div></div>
  `;
}

function setFilter(f) {
  activeFilter = f;
  ['all','red','yellow','green'].forEach(k => {
    document.getElementById('btn-'+k).className = 'filter-btn' + (k === f ? ' active-'+k : '');
  });
  renderItems();
}

function filterItems() { renderItems(); }

function renderItems() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let items = ASSEMBLY_DATA;
  if (activeFilter !== 'all') items = items.filter(d => getStatus(d.max_buildable) === activeFilter);
  if (q) items = items.filter(d =>
    d.name.toLowerCase().includes(q) ||
    (d.sku && d.sku.toLowerCase().includes(q)) ||
    d.bottleneck.toLowerCase().includes(q) ||
    d.components.some(c => c.name.toLowerCase().includes(q))
  );

  const grid = document.getElementById('itemsGrid');
  if (!items.length) { grid.innerHTML = '<div class="no-results">No products match your filter.</div>'; return; }

  grid.innerHTML = items.map((d, i) => {
    const st = getStatus(d.max_buildable);
    const displayNum = d.max_buildable <= 0 ? '0' : d.max_buildable >= 1000 ? (d.max_buildable/1000).toFixed(1)+'k' : d.max_buildable;
    const comps = [...d.components].sort((a,b) => a.can_build - b.can_build);
    const rows = comps.map(c => {
      const isBN = c.name === d.bottleneck;
      return `<tr class="${isBN ? 'bottleneck-row' : ''}">
        <td>${c.name}</td>
        <td style="text-align:right;color:#94a3b8">${c.qty_per > 1 ? '×'+c.qty_per : '×1'}</td>
        <td style="text-align:right;color:#64748b">${c.available}</td>
        <td style="text-align:right"><span class="can-build-val ${isBN ? 'limiting' : 'ok'}">${c.can_build}</span></td>
      </tr>`;
    }).join('');
    return `<div class="item-card ${st}" id="card-${i}" onclick="toggleCard(${i})">
      <div class="item-header">
        <div class="badge ${st}">${displayNum}</div>
        <div class="item-info">
          <div class="item-name">${d.name}</div>
          <div class="item-meta">Bottleneck: <strong>${d.bottleneck}</strong>${d.sku ? ' · ' + d.sku : ''}</div>
        </div>
        <div class="expand-icon">▼</div>
      </div>
      <div class="item-detail">
        <table class="comp-table">
          <thead><tr><th>Component</th><th style="text-align:right">Per Unit</th><th style="text-align:right">In Stock</th><th style="text-align:right">Can Build</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
  }).join('');
}

function toggleCard(i) {
  document.getElementById('card-'+i).classList.toggle('expanded');
}

const updated = ASSEMBLY_DATA[0]?.updated || 'unknown';
document.getElementById('updatedAt').textContent = 'Last updated: ' + updated + ' · stat.io Zoho Inventory';
renderSummary();
renderItems();
</script>
